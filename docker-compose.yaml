services:
  test:
    build:
      dockerfile: Dockerfile
      target: test
    depends_on:
      - sertifikatsok
    volumes:
      - .:/opt/sertifikatsok/repo
    working_dir: /opt/sertifikatsok/repo/api
    command: bash -c "trap 'exit 0' SIGTERM; while true; do sleep 2; done"
  startupcheck:
    build:
      dockerfile: Dockerfile
      target: test
    depends_on:
      - ldap_server_test
      - ldap_server_prod
    volumes:
      - ./misc:/opt/sertifikatsok/misc
      - ./api:/opt/sertifikatsok/api
    command: "bash /opt/sertifikatsok/misc/check_if_testserver_started_and_delete_crl_cache.sh"
  sertifikatsok:
    build:
      dockerfile: Dockerfile
      args:
        SERTIFIKATSOK_VERSION: dev
    ports:
      - 127.0.0.1:7001:7001
    environment:
      - DEV=true
      - APP_CERTS_DIR=/certs/out
      - APP_CRLS_DIR=/tmp
      - APP_DB_FILE=/var/database/database.db
    depends_on:
      startupcheck:
        condition: service_completed_successfully
    volumes:
      - ./api/database:/var/database
      - ./testserver/cloned_certs:/certs/out
    command: "--host 0.0.0.0 --port 7001"
  ldap_server_test:
    build:
      dockerfile: Dockerfile
      target: test
    environment:
      - ENVIRONMENT=test
      - TESTSERVER_IN_DIR=/certs/in
      - TESTSERVER_OUT_DIR=/certs/out
      - RUNNING_IN_DOCKER=true
    working_dir: /opt/sertifikatsok/testserver
    command: python3 -m testserver
    ports:
      - 127.0.0.1:3890:389
    volumes:
      - ./api/certs:/certs/in
      - ./testserver/cloned_certs:/certs/out
      - ./testserver:/opt/sertifikatsok/testserver
    networks:
      default:
        aliases:
          - ldap.test4.buypass.no
          - crl.test4.buypass.no
          - ocsp.test4.buypass.no
          - crl.test4.buypassca.com
          - ocspbs.test4.buypassca.com
          - ocspps.test4.buypassca.com
          - ldap.test.commfides.com
          - crl1.test.commfides.com
          - crl2.test.commfides.com
          - crl.test.commfides.com
          - ocsp1.test.commfides.com
          - ocsp.test.commfides.com
  ldap_server_prod:
    build:
      dockerfile: Dockerfile
      target: test
    environment:
      - ENVIRONMENT=prod
      - TESTSERVER_IN_DIR=/certs/in
      - TESTSERVER_OUT_DIR=/certs/out
      - RUNNING_IN_DOCKER=true
    working_dir: /opt/sertifikatsok/testserver
    command: python3 -m testserver
    ports:
      - 127.0.0.1:3891:389
    volumes:
      - ./api/certs:/certs/in
      - ./testserver/cloned_certs:/certs/out
      - ./testserver:/opt/sertifikatsok/testserver
    networks:
      default:
        aliases:
          - ldap.buypass.no
          - crl.buypass.no
          - ocsp.buypass.no
          - crl.buypassca.com
          - ocspbs.buypassca.com
          - cspps.buypassca.com
          - ldap.commfides.com
          - crl1.commfides.com
          - crl2.commfides.com
          - crl.commfides.com
          - ocsp1.commfides.com
          - ocsp.commfides.com

networks:
  default:
    name: sertifikatsok
