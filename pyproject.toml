[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "yarl",
    "lxml>=5.3.0",
    "ruff",
    "ty>=0.0.53",
]

[tool.uv.workspace]
members = [
    "api",
    "testserver",
    "ruldap3",
]

[tool.uv]
exclude-newer = "P14D"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = ["apitest: api tests to be run in the docker compose stack"]

[tool.ruff]
lint.select = [
    "E",
    "F",
    "PLW",
    "PLE",
    "W",
    "B",
    "UP",
    "DTZ",
    "TRY",
    "C4",
    "I",
    "N",
    "G",
    "PIE",
    "PT",
    "PTH",
    "S",
    "SIM",
    "RUF",
    "FBT",
]
lint.ignore = ["TRY003", "S101", "W191", "E501", "N815"]

[tool.ruff.lint.per-file-ignores]
# Twisted...
"testserver/src/testserver/**" = ["N802", "N815"]

[tool.ruff.lint.isort]
known-first-party = ["sertifikatsok"]
